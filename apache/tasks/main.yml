---
- name: Install Apache
  yum:
    name: "{{ package_name }}"
    state: present

- name: Copy Apache Web Page
  template:
    src: index.html.j2
    dest: "{{ web_root }}/index.html"
  notify:
    - Restart Apache

- name: Start Apache Service
  service:
    name: "{{ service_name }}"
    state: started
    enabled: yes

- name: Post Installation Message
  debug:
    msg: "Apache installation completed successfully on {{ inventory_hostname }}"