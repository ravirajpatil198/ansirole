---
- name: Install Nginx
  yum:
    name: "{{ package_name }}"
    state: present

- name: Copy Nginx Web Page
  template:
    src: index.html.j2
    dest: "{{ web_root }}/index.html"
  notify:
    - Restart Nginx

- name: Start Nginx Service
  service:
    name: "{{ service_name }}"
    state: started
    enabled: yes

- name: Post Installation Message
  debug:
    msg: "Nginx installation completed successfully on {{ inventory_hostname }}"